<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screencord</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Screencord</h1>
        <p style="opacity:0.6; margin-bottom:32px;">Record your browser tab, window, or entire screen with audio.</p>
        
        <div id="timer">00:00:00</div>
        
        <div class="controls">
            <button id="start-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
                Start Recording
            </button>
            <button id="stop-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                Stop & Save
            </button>
        </div>

        <video id="preview" controls></video>
        <div class="status" id="status">Ready to capture</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
